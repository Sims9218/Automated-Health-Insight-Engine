name: HRI Engine Automation

on:
  schedule:
    # Runs every hour, on the hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing
permissions:
  contents: write
jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy requests scikit-learn joblib supabase

      # Ensure folders exist so Git doesn't complain
      - name: Create Folders
        run: mkdir -p models/versions

      - name: Run HRI Engine
        env:
          # This must match the os.getenv("API_KEY") in your script
          API_KEY: ${{ secrets.AIR_QUALITY_API_KEY }} 
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Set PYTHONPATH so scripts can import from each other in the same folder
          export PYTHONPATH=$PYTHONPATH:$(pwd)/scripts
          python scripts/main_engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "HRI-Bot"
          git config --global user.email "bot@hri-project.com"
          
          # We add ALL csv files in data/ and the model in models/
          git add models/*.pkl
          
          # If there are changes, commit, pull latest, and then push
          if ! git diff --staged --quiet; then
            git commit -m "Automated Data Fetch & Forecast Update [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
